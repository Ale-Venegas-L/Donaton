server:
  port: 8062
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
spring:
  cloud:
    gateway:
      routes:
        - id: springboot
          uri: lb://springboot
          predicates:
            - Path=/api/springboot/**
          filters:
            - StripPrefix=2