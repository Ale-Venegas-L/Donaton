server:
  port: 8084
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
spring:
  cloud:
    gateway:
      routes:
        - id: campaign
          uri: lb://campaign
          predicates:
            - Path=/api/campaigns/**
        - id: donation
          uri: lb://donation
          predicates:
            - Path=/donation/**
        - id: volunteers
          uri: lb://volunteers
          predicates:
            - Path=/api/volunteers/**
